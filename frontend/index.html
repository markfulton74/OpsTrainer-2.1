function addOutcome() {
  // Save all current field values before re-rendering
  const topic = document.getElementById('forgeTopic')?.value;
  const audience = document.getElementById('forgeAudience')?.value;
  const doctrine = document.getElementById('forgeDoctrine')?.value;
  const modules = document.getElementById('forgeModules')?.value;
  const hours = document.getElementById('forgeHours')?.value;
  if (topic !== undefined) state.forgeTopic = topic;
  if (audience !== undefined) state.forgeAudience = audience;
  if (doctrine !== undefined) state.forgeDoctrine = doctrine;
  if (modules !== undefined) state.forgeModules = parseInt(modules);
  if (hours !== undefined) state.forgeHours = parseFloat(hours);

  const inputs = document.querySelectorAll('input[id^="outcome"]');
  state.forgeOutcomes = Array.from(inputs).map(el => el.value);
  state.forgeOutcomes.push('');
  document.getElementById('forgePanel').innerHTML = renderForgeStep1();
}

function removeOutcome(index) {
  const topic = document.getElementById('forgeTopic')?.value;
  const audience = document.getElementById('forgeAudience')?.value;
  const doctrine = document.getElementById('forgeDoctrine')?.value;
  const modules = document.getElementById('forgeModules')?.value;
  const hours = document.getElementById('forgeHours')?.value;
  if (topic !== undefined) state.forgeTopic = topic;
  if (audience !== undefined) state.forgeAudience = audience;
  if (doctrine !== undefined) state.forgeDoctrine = doctrine;
  if (modules !== undefined) state.forgeModules = parseInt(modules);
  if (hours !== undefined) state.forgeHours = parseFloat(hours);

  const inputs = document.querySelectorAll('input[id^="outcome"]');
  state.forgeOutcomes = Array.from(inputs).map(el => el.value);
  state.forgeOutcomes.splice(index, 1);
  if (state.forgeOutcomes.length === 0) state.forgeOutcomes = [''];
  document.getElementById('forgePanel').innerHTML = renderForgeStep1();
}

async function runForgeStep1() {
  const topic = document.getElementById('forgeTopic')?.value.trim();
  const audience = document.getElementById('forgeAudience')?.value.trim();
  const outcomes = Array.from(document.querySelectorAll('input[id^="outcome"]')).map(el => el.value.trim()).filter(Boolean);
  const num_modules = parseInt(document.getElementById('forgeModules')?.value || '4');
  const estimated_hours = parseFloat(document.getElementById('forgeHours')?.value || '2');
  const doctrine_text = document.getElementById('forgeDoctrine')?.value.trim();

  if (!topic) return toast('Please enter a course topic', 'error');
  if (!audience) return toast('Please enter a target audience', 'error');
  if (outcomes.length === 0) return toast('Please add at least one learning outcome', 'error');

  state.forgeTopic = topic;
  state.forgeAudience = audience;
  state.forgeOutcomes = outcomes;
  state.forgeDoctrine = doctrine_text;

  document.getElementById('forgePanel').innerHTML = `
    <div class="forge-panel" style="text-align:center;padding:60px 24px;">
      <div style="font-size:48px;margin-bottom:16px;animation:spin 2s linear infinite;display:inline-block;">🔥</div>
      <div style="font-size:20px;font-weight:700;color:var(--gray-900);margin-bottom:8px;">Building your course structure...</div>
      <div style="color:var(--gray-500);margin-bottom:4px;">AI is designing modules, lessons, and competency maps.</div>
      <div style="font-size:13px;color:var(--gray-400);margin-top:12px;">This takes 15–30 seconds ☕ — please wait</div>
      <div style="margin-top:24px;">
        <div style="background:var(--gray-100);border-radius:8px;height:6px;overflow:hidden;">
          <div id="forgeProgress" style="background:var(--primary);height:6px;width:5%;border-radius:8px;transition:width 0.5s;"></div>
        </div>
      </div>
    </div>
  `;
  // Animate progress bar
  let pct = 5;
  const progressTimer = setInterval(() => {
    pct = Math.min(pct + (Math.random() * 8), 90);
    const bar = document.getElementById('forgeProgress');
    if (bar) bar.style.width = pct + '%';
    else clearInterval(progressTimer);
  }, 800);

  const data = await api('POST', '/forge/generate-structure', {
    topic, audience, outcomes, num_modules, estimated_hours,
    doctrine_text: doctrine_text || undefined,
    language: 'en',
  });

  if (!data?.success) {
    const errMsg = data?.error || 'Generation failed.';
    clearInterval(progressTimer);
    const isApiKey = errMsg.toLowerCase().includes('api') || errMsg.toLowerCase().includes('key') || errMsg.toLowerCase().includes('configured');
    toast(isApiKey 
      ? '🔑 AI key not configured — set DEEPSEEK_API_KEY in your Render environment variables' 
      : errMsg, 'error', 6000);
    document.getElementById('forgePanel').innerHTML = renderForgeStep1();
    return;
  }

  clearInterval(progressTimer);
  state.forgeJobId = data.job_id;
  state.forgeStructure = data.structure;
  state.forgeStep = 2;
  render();
}

function renderForgeStep2() {
  const s = state.forgeStructure;
  if (!s) return '<p>No structure loaded.</p>';

  return `
    <div class="forge-panel">
      <div class="forge-panel-title">✅ Review Course Structure</div>
      <div class="forge-panel-desc">The AI has designed your course. Review and adjust before generating full content.</div>

      <div class="card mb-4" style="background:var(--primary-light);border-color:var(--primary)">
        <div class="card-body">
          <div style="font-size:18px;font-weight:800;color:var(--gray-900);">${s.title}</div>
          ${s.subtitle ? `<div class="text-muted mt-1">${s.subtitle}</div>` : ''}
          <div class="flex gap-3 mt-2">
            <span class="badge badge-primary">${s.difficulty || 'intermediate'}</span>
            <span class="badge badge-gray">📂 ${s.category || 'Training'}</span>
            <span class="badge badge-gray">${s.modules?.length || 0} modules</span>
          </div>
          ${s.description ? `<p class="mt-3" style="font-size:13px;">${s.description}</p>` : ''}
        </div>
      </div>

      <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">Course Modules</h3>
      <div class="structure-preview">
        ${(s.modules || []).map((mod, mi) => `
          <div class="module-preview">
            <div class="module-preview-header">
              <span>📖 Module ${mi + 1}: ${mod.title}</span>
              <span class="text-muted text-sm">~${mod.estimated_minutes} min</span>
            </div>
            <div class="module-preview-lessons">
              ${(mod.lessons || []).map(l => `
                <div class="lesson-preview">
                  <span>${l.content_type === 'scenario' ? '🎭' : l.content_type === 'assessment' ? '📝' : '📄'}</span>
                  ${l.title}
                  <span class="text-muted text-sm">(${l.estimated_minutes}min)</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      ${s.suggested_competencies?.length ? `
        <div class="mt-4">
          <div class="text-sm font-bold mb-2">Competency Mappings</div>
          <div class="flex gap-2" style="flex-wrap:wrap;">
            ${s.suggested_competencies.map(c => `<span class="badge badge-gray">${c}</span>`).join('')}
          </div>
        </div>
      ` : ''}

      <div class="flex gap-3 mt-4">
        <button class="btn btn-secondary" onclick="state.forgeStep=1;render()">← Back</button>
        <button class="btn btn-primary" onclick="runForgeStep3()" style="min-width:200px;">
          🚀 Generate Full Content →
        </button>
      </div>
    </div>
  `;
}

async function runForgeStep3() {
  const s = state.forgeStructure;
  const modules = s.modules || [];
  state.forgeStep = 3;

  document.getElementById('forgePanel').innerHTML = `
    <div class="forge-panel">
      <div class="forge-panel-title">⚡ Generating Course Content</div>
      <div class="forge-panel-desc">Writing lessons, scenarios and questions for each module...</div>
      <div id="moduleProgress" class="mt-4">
        ${modules.map((m, i) => `
          <div class="flex items-center gap-3 mb-3" id="modProgress${i}">
            <div class="spinner spinner-sm"></div>
            <div>
              <div style="font-size:13px;font-weight:600;">Module ${i + 1}: ${m.title}</div>
              <div class="text-sm text-muted" id="modStatus${i}">Waiting...</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  state.forgeModulesContent = [];

  // Generate modules sequentially to avoid rate limits
  for (let i = 0; i < modules.length; i++) {
    const mod = modules[i];
    const statusEl = document.getElementById(`modStatus${i}`);
    const progressEl = document.getElementById(`modProgress${i}`);

    if (statusEl) statusEl.textContent = 'Generating...';

    const data = await api('POST', '/forge/generate-module', {
      job_id: state.forgeJobId,
      module_index: i,
      module_title: mod.title,
      module_description: mod.description,
      lessons: mod.lessons || [],
      course_title: s.title,
      audience: state.forgeAudience,
      doctrine_text: state.forgeDoctrine,
    });

    if (data?.success) {
      state.forgeModulesContent.push(data.content);
      if (progressEl) {
        progressEl.innerHTML = `
          <span style="color:var(--success);font-size:18px;">✅</span>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--success);">Module ${i + 1}: ${mod.title}</div>
            <div class="text-sm text-muted">${data.content?.lessons?.length || 0} lessons generated</div>
          </div>
        `;
      }
    } else {
      if (statusEl) statusEl.textContent = 'Generation failed — will use structure only';
      state.forgeModulesContent.push({ module_title: mod.title, lessons: [] });
    }
  }

  state.forgeStep = 4;
  render();
}

function renderForgeStep4() {
  const s = state.forgeStructure;
  const totalLessons = state.forgeModulesContent.reduce((acc, m) => acc + (m.lessons?.length || 0), 0);
  const totalQuestions = state.forgeModulesContent.reduce((acc, m) =>
    acc + (m.lessons || []).reduce((a, l) => a + (l.questions?.length || 0), 0), 0);

  return `
    <div class="forge-panel">
      <div class="forge-panel-title">🎉 Ready to Publish</div>
      <div class="forge-panel-desc">Your course has been generated. Review the summary and publish when ready.</div>

      <div class="card mb-4" style="background:var(--success-light);border-color:var(--success);">
        <div class="card-body">
          <div style="font-size:16px;font-weight:800;color:var(--gray-900);">${s.title}</div>
          <div class="flex gap-3 mt-2">
            <span>📖 ${s.modules?.length} modules</span>
            <span>📄 ${totalLessons} lessons</span>
            <span>❓ ${totalQuestions} questions</span>
          </div>
        </div>
      </div>

      <div class="structure-preview mb-4">
        ${state.forgeModulesContent.map((m, i) => `
          <div class="module-preview">
            <div class="module-preview-header">
              <span>✅ Module ${i + 1}: ${m.module_title}</span>
              <span class="badge badge-success">${m.lessons?.length || 0} lessons</span>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="flex gap-3">
        <button class="btn btn-secondary" onclick="state.forgeStep=2;render()">← Back to Structure</button>
        <button class="btn btn-success" onclick="publishForge()" style="min-width:160px;">
          🚀 Publish Course
        </button>
      </div>
    </div>
  `;
}

async function publishForge() {
  const s = state.forgeStructure;
  const btn = document.querySelector('.forge-panel .btn-success');
  if (btn) { btn.disabled = true; btn.textContent = 'Publishing...'; }

  const data = await api('POST', '/forge/publish', {
    job_id: state.forgeJobId,
    course_data: {
      title: s.title,
      description: s.description,
      category: s.category,
      difficulty: s.difficulty,
      estimated_hours: parseFloat(document.getElementById('forgeHours')?.value || '2'),
    },
    modules_data: state.forgeModulesContent,
  });

  if (!data?.success) {
    toast(data?.error || 'Publish failed', 'error');
    if (btn) { btn.disabled = false; btn.textContent = '🚀 Publish Course'; }
    return;
  }

  toast(`"${s.title}" published successfully! 🎉`, 'success', 5000);
  // Reset forge state
  state.forgeStep = 1;
  state.forgeStructure = null;
  state.forgeJobId = null;
  state.forgeModulesContent = [];
  state.forgeOutcomes = ['', '', ''];
  state.forgeTopic = '';
  state.forgeAudience = '';
  state.forgeDoctrine = '';

  navigate('admin-courses');
}

// ---- Forge step routing ----
const forgeStepRenderers = {
  1: renderForgeStep1,
  2: renderForgeStep2,
  3: () => '<div class="forge-panel generating-overlay"><div class="spinner"></div><p>Generating...</p></div>',
  4: renderForgeStep4,
};

function renderVerifyPage(num) {
  return `
    <div class="verify-page">
      <div class="verify-card">
        <div class="auth-logo" style="margin-bottom:24px;">
          <div class="logo-mark">
            <div class="logo-icon">🌍</div>
            <div class="logo-text">Ops<span>Trainer</span></div>
          </div>
        </div>
        <div id="verifyContent">
          <div class="spinner" style="margin:0 auto;"></div>
          <p class="text-muted mt-3">Verifying certificate...</p>
        </div>
      </div>
    </div>
  `;
}

async function loadVerifyCert(num) {
  const data = await api('GET', `/certificates/verify/${num}`);
  const el = document.getElementById('verifyContent');
  if (!el) return;

  if (!data || !data.success) {
    el.innerHTML = `<div class="verify-icon">❌</div><div class="verify-title text-danger">Certificate Not Found</div><p class="text-muted">This certificate number does not exist in our system.</p>`;
    return;
  }

  const c = data.certificate;
  el.innerHTML = `
    <div class="verify-icon">${data.valid ? '✅' : '❌'}</div>
    <div class="verify-title" style="color:${data.valid ? 'var(--success)' : 'var(--danger)'}">
      ${data.valid ? 'Valid Certificate' : data.revoked ? 'Certificate Revoked' : 'Certificate Expired'}
    </div>
    <hr class="divider" />
    <div class="verify-detail"><strong>${c.learner_name}</strong></div>
    <div class="verify-detail" style="font-size:16px;font-weight:700;margin:8px 0;">${c.course_title}</div>
    <div class="verify-detail">Issued by <strong>${c.org_name}</strong></div>
    <div class="verify-detail">Issued: <strong>${new Date(c.issued_at).toLocaleDateString()}</strong></div>
    ${c.expires_at ? `<div class="verify-detail">Expires: <strong>${new Date(c.expires_at).toLocaleDateString()}</strong></div>` : ''}
    <div style="font-family:monospace;font-size:12px;color:var(--gray-500);margin-top:16px;">${c.number}</div>
  `;
}

// ============================================
// HELPERS & LIFECYCLE
// ============================================
function logout() {
  api('POST', '/auth/logout', { refreshToken: Auth.getRefreshToken() });
  Auth.clearTokens();
  state.user = null;
  state.org = null;
  state.currentView = 'login';
  render();
}

function showUserMenu() {
  // Simple logout confirmation for now
  if (confirm(`Sign out as ${state.user?.full_name}?`)) logout();
}

function bindEvents() {
  // Keyboard shortcuts
  document.onkeydown = (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-backdrop').forEach(m => m.remove());
    }
  };
}

// ---- View lifecycle: run after render ----
const viewLoaders = {
  dashboard: loadLearnerDashboard,
  courses: loadCourses,
  'ai-instructor': null,
  certificates: loadCertificates,
  cbir: loadCBIRReport,
  'admin-dashboard': loadAdminDashboard,
  'admin-courses': loadAdminCourses,
  'course-editor': loadCourseEditor,
  'admin-users': loadAdminUsers,
  forge: () => {
    const panel = document.getElementById('forgePanel');
    if (panel) panel.innerHTML = (forgeStepRenderers[state.forgeStep] || renderForgeStep1)();
  },
};

// View loaders are now called directly inside render()

// ============================================
// SIDEBAR TOGGLE (mobile)
// ============================================
function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (!sidebar) return;
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) {
    sidebar.classList.remove('open');
    if (overlay) overlay.classList.remove('visible');
  } else {
    sidebar.classList.add('open');
    if (overlay) overlay.classList.add('visible');
  }
}
function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('visible');
}

// ============================================
// BOOT
// ============================================
async function boot() {
  // Check if verify page
  if (window.location.pathname.startsWith('/verify/')) {
    render();
    return;
  }

  // Restore session
  if (Auth.isLoggedIn()) {
    const data = await api('GET', '/auth/me');
    if (data?.success && data.user) {
      state.user = data.user;
      state.org = {
        id: data.user.org_id,
        name: data.user.org_name,
        subscription_tier: data.user.subscription_tier,
        subscription_status: data.user.subscription_status
      };
      state.currentView = 'dashboard';
    } else {
      Auth.clearTokens();
    }
  }

  render();
}

// Handle browser back/forward
window.addEventListener('popstate', () => render());

// Start
boot();

    <div style="background:#fff;border-radius:16px;max-width:680px;width:100%;padding:48px 40px;text-align:center;position:relative;box-shadow:0 24px 64px rgba(0,0,0,0.3);">
      <button onclick="document.getElementById('certModal').remove()" 
              style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;">✕</button>
      <img src="/assets/branding/logo.png" alt="OpsTrainer" 
           onerror="this.style.display='none'"

      <div style="font-size:28px;font-weight:700;color:#1a1a2e;margin-bottom:8px;">${cert.learner_name || state.user?.full_name || 'Learner'}</div>
      <div style="font-size:15px;color:#555;margin-bottom:20px;">has successfully completed</div>
      <div style="font-size:20px;font-weight:600;color:#2563eb;margin-bottom:24px;padding:12px 24px;background:#eff6ff;border-radius:8px;display:inline-block;">${cert.course_title || state.currentCourse?.title || 'Course'}</div>
      <div style="font-size:13px;color:#888;margin-bottom:24px;">
        Issued: ${cert.issued_at ? new Date(cert.issued_at).toLocaleDateString('en-ZA', {day:'numeric',month:'long',year:'numeric'}) : new Date().toLocaleDateString('en-ZA', {day:'numeric',month:'long',year:'numeric'})}
      </div>
      <div style="font-size:11px;color:#aaa;letter-spacing:1px;border-top:1px solid #eee;padding-top:16px;margin-top:8px;">
